name: Terraform CI/CD

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    paths:
      - 'infrastructure/**'
      - 'k8s/**'
      - '.github/workflows/**'

env:
  TF_WORKING_DIR: infrastructure

jobs:

  detect-changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      dev: ${{ steps.filter.outputs.dev }}
      staging: ${{ steps.filter.outputs.staging }}
      prod: ${{ steps.filter.outputs.prod }}
      modules: ${{ steps.filter.outputs.modules }}
    steps:
      - uses: actions/checkout@v3

      - name: Filter changed paths
        uses: dorny/paths-filter@v2
        id: filter
        with:
          filters: |
            dev:
              - 'infrastructure/environments/dev/**'
            staging:
              - 'infrastructure/environments/staging/**'
            prod:
              - 'infrastructure/environments/prod/**'
            modules:
              - 'infrastructure/modules/**'
              - 'infrastructure/main.tf'
              - 'infrastructure/variables.tf'
              - 'infrastructure/versions.tf'

  plan-dev:
    name: Plan -- dev
    runs-on: ubuntu-latest
    needs: detect-changes
    steps:
      - name: No dev changes
        if: needs.detect-changes.outputs.dev != 'true' && needs.detect-changes.outputs.modules != 'true'
        run: echo "::notice::No dev or module changes -- plan skipped"

      - uses: actions/checkout@v3
        if: needs.detect-changes.outputs.dev == 'true' || needs.detect-changes.outputs.modules == 'true'

      - uses: hashicorp/setup-terraform@v3
        if: needs.detect-changes.outputs.dev == 'true' || needs.detect-changes.outputs.modules == 'true'
        with:
          terraform_version: 1.7.0

      - name: Configure AWS credentials
        if: needs.detect-changes.outputs.dev == 'true' || needs.detect-changes.outputs.modules == 'true'
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Terraform Init
        if: needs.detect-changes.outputs.dev == 'true' || needs.detect-changes.outputs.modules == 'true'
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init

      - name: Terraform Validate
        if: needs.detect-changes.outputs.dev == 'true' || needs.detect-changes.outputs.modules == 'true'
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform validate

      - name: Terraform Plan
        if: needs.detect-changes.outputs.dev == 'true' || needs.detect-changes.outputs.modules == 'true'
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform plan \
            -var="aws_region=ap-south-1" \
            -var="environment=dev" \
            -var="enable_creation=false" \
            -var="public_subnet_count=2" \
            -var="private_subnet_count=2"

  plan-staging:
    name: Plan -- staging
    runs-on: ubuntu-latest
    needs: detect-changes
    steps:
      - name: No staging changes
        if: needs.detect-changes.outputs.staging != 'true' && needs.detect-changes.outputs.modules != 'true'
        run: echo "::notice::No staging or module changes -- plan skipped"

      - uses: actions/checkout@v3
        if: needs.detect-changes.outputs.staging == 'true' || needs.detect-changes.outputs.modules == 'true'

      - uses: hashicorp/setup-terraform@v3
        if: needs.detect-changes.outputs.staging == 'true' || needs.detect-changes.outputs.modules == 'true'
        with:
          terraform_version: 1.7.0

      - name: Configure AWS credentials
        if: needs.detect-changes.outputs.staging == 'true' || needs.detect-changes.outputs.modules == 'true'
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Terraform Init
        if: needs.detect-changes.outputs.staging == 'true' || needs.detect-changes.outputs.modules == 'true'
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init

      - name: Terraform Validate
        if: needs.detect-changes.outputs.staging == 'true' || needs.detect-changes.outputs.modules == 'true'
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform validate

      - name: Terraform Plan
        if: needs.detect-changes.outputs.staging == 'true' || needs.detect-changes.outputs.modules == 'true'
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform plan \
            -var="aws_region=ap-south-1" \
            -var="environment=staging" \
            -var="enable_creation=false" \
            -var="public_subnet_count=2" \
            -var="private_subnet_count=2"

  plan-prod:
    name: Plan -- prod
    runs-on: ubuntu-latest
    needs: detect-changes
    steps:
      - name: No prod changes
        if: needs.detect-changes.outputs.prod != 'true' && needs.detect-changes.outputs.modules != 'true'
        run: echo "::notice::No prod or module changes -- plan skipped"

      - uses: actions/checkout@v3
        if: needs.detect-changes.outputs.prod == 'true' || needs.detect-changes.outputs.modules == 'true'

      - uses: hashicorp/setup-terraform@v3
        if: needs.detect-changes.outputs.prod == 'true' || needs.detect-changes.outputs.modules == 'true'
        with:
          terraform_version: 1.7.0

      - name: Configure AWS credentials
        if: needs.detect-changes.outputs.prod == 'true' || needs.detect-changes.outputs.modules == 'true'
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Terraform Init
        if: needs.detect-changes.outputs.prod == 'true' || needs.detect-changes.outputs.modules == 'true'
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init

      - name: Terraform Validate
        if: needs.detect-changes.outputs.prod == 'true' || needs.detect-changes.outputs.modules == 'true'
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform validate

      - name: Terraform Plan
        if: needs.detect-changes.outputs.prod == 'true' || needs.detect-changes.outputs.modules == 'true'
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform plan \
            -var="aws_region=ap-south-1" \
            -var="environment=prod" \
            -var="enable_creation=false" \
            -var="public_subnet_count=3" \
            -var="private_subnet_count=3"

  pipeline-status:
    name: Pipeline status
    runs-on: ubuntu-latest
    needs: [detect-changes, plan-dev, plan-staging, plan-prod]
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ needs.plan-dev.result }}" == "failure" || \
                "${{ needs.plan-staging.result }}" == "failure" || \
                "${{ needs.plan-prod.result }}" == "failure" ]]; then
            echo "One or more plans failed"
            exit 1
          fi
          echo "All plans passed or skipped"
          exit 0
